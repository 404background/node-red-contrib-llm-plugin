<meta charset="utf-8">
<link rel="stylesheet" type="text/css" href="llm-plugin_styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script src="llm-plugin/src/client.js" charset="utf-8"></script>

<script type="text/html" id="llm-plugin-settings-template" data-template-name="llm-plugin-settings-template">
    <div class="form-row">
        <label for="llm-provider"><i class="fa fa-cogs"></i> LLM Provider</label>
        <select id="llm-provider">
            <option value="ollama">Ollama</option>
            <option value="openai">OpenAI</option>
        </select>
    </div>

    <div id="ollama-settings">
        <div class="form-row">
            <label for="ollama-url"><i class="fa fa-network-wired"></i> Ollama URL</label>
            <input type="text" id="ollama-url" placeholder="http://localhost:11434">
        </div>
    </div>

    <div id="openai-settings" style="display: none;">
        <div class="form-row">
            <label for="openai-api-key"><i class="fa fa-key"></i> OpenAI API Key</label>
            <input type="password" id="openai-api-key" placeholder="sk-..." autocomplete="off">
        </div>
        <div class="form-tips" style="font-size: 12px; color: #666; margin-top: 5px;">
            <i class="fa fa-info-circle"></i> API Key is stored in Node-RED's internal configuration (e.g. <code>.config.runtime.json</code>) and is <strong>NOT</strong> included in flow exports.
        </div>
    </div>

    <div class="form-row" style="margin-top: 12px;">
        <label for="llm-system-prompt"><i class="fa fa-comment-alt"></i> System Prompt</label>
        <textarea id="llm-system-prompt" rows="6" style="width: 100%; font-family: monospace; font-size: 12px; resize: vertical;" placeholder="Additional instructions for the LLM..."></textarea>
        <div class="form-tips" style="font-size: 12px; color: #666; margin-top: 5px;">
            <i class="fa fa-info-circle"></i> This text is prepended to the built-in system prompt for every request. Use it to give the LLM persistent instructions (e.g. preferred node types, coding style, language).
        </div>
        <button type="button" id="llm-system-prompt-reset" style="margin-top: 4px; font-size: 11px; padding: 2px 8px;">Reset to default</button>
    </div>

    <div class="form-row" style="margin-top: 12px;">
        <label for="llm-max-prompt-length"><i class="fa fa-text-width"></i> Max Prompt Length</label>
        <input type="number" id="llm-max-prompt-length" min="100" max="100000" step="100" value="10000" style="width: 120px;">
        <span style="font-size: 12px; color: #666; margin-left: 6px;">characters</span>
        <div class="form-tips" style="font-size: 12px; color: #666; margin-top: 5px;">
            <i class="fa fa-info-circle"></i> Maximum character length for prompts sent to the LLM. Range: 100 - 100,000. Default: 10,000.
        </div>
    </div>
</script>
